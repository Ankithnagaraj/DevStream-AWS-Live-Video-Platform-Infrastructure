<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DevStream Admin</title>
</head>
<body>

<h1>DevStream Admin</h1>

<p>
Total Videos:
<span id="st">0</span>
</p>

<table border="1" width="100%">
<thead>
<tr>
<th>ID</th>
<th>Title</th>
<th>Creator</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="ab">
<tr>
<td colspan="5">Loading...</td>
</tr>
</tbody>
</table>

<button onclick="logout()">Logout</button>

<script>

const token = localStorage.getItem('ds_token');

if(!token){
    location.href='/';
}

async function loadVids(){

    const res = await fetch('/api/admin/videos',{
        headers:{
            Authorization:'Bearer '+token
        }
    });

    const vids = await res.json();

    document.getElementById('st').innerText=vids.length;

    let html='';

    vids.forEach(v=>{

        let btn='';

        if(v.status!=='published'){
            btn='<button onclick="pub('+v.id+',\''+v.s3_key+'\')">Publish</button>';
        }else{
            btn='Published';
        }

        html +=
        '<tr>'+
        '<td>'+v.id+'</td>'+
        '<td>'+v.title+'</td>'+
        '<td>'+v.creator+'</td>'+
        '<td>'+v.status+'</td>'+
        '<td>'+btn+'</td>'+
        '</tr>';

    });

    document.getElementById('ab').innerHTML=html;
}

async function pub(id,key){

    const res = await fetch('/api/admin/publish',{
        method:'POST',
        headers:{
            'Authorization':'Bearer '+token,
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            video_id:id,
            s3_key:key
        })
    });

    const data=await res.json();

    alert(JSON.stringify(data));

    loadVids();
}

function logout(){
    localStorage.clear();
    location.href='/';
}

window.pub=pub;
window.logout=logout;

loadVids();

</script>

</body>
</html>
