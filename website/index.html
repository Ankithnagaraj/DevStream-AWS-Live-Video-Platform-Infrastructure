<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DevStream - Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;
     background:linear-gradient(135deg,#0d1117 0%,#0d2340 100%);
     font-family:'Segoe UI',system-ui,sans-serif;}
.card{background:#161b22;border:1px solid #30363d;border-radius:12px;
      padding:42px 38px;width:100%;max-width:400px;
      box-shadow:0 20px 60px rgba(0,0,0,.5);}
.logo{text-align:center;margin-bottom:28px;}
.logo-icon{font-size:50px;display:block;margin-bottom:10px;}
.logo h1{color:#fff;font-size:24px;font-weight:700;}
.logo p{color:#58a6ff;font-size:13px;margin-top:4px;}
.grp{margin-bottom:18px;}
label{display:block;color:#8b949e;font-size:11px;font-weight:700;
      text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
input{width:100%;padding:12px 14px;background:#0d1117;
      border:1px solid #30363d;border-radius:6px;
      color:#e6edf3;font-size:14px;outline:none;transition:border-color .2s;}
input:focus{border-color:#58a6ff;}
.btn{width:100%;padding:13px;background:#58a6ff;color:#0d1117;
     font-size:15px;font-weight:700;border:none;border-radius:6px;
     cursor:pointer;margin-top:6px;transition:background .2s;}
.btn:hover{background:#79c0ff;}
.btn:disabled{background:#21262d;color:#555;cursor:not-allowed;}
.errmsg{color:#ff7b72;font-size:13px;text-align:center;margin-top:14px;
        padding:10px;background:#2b0f0f;border-radius:6px;display:none;}
.demo{margin-top:22px;padding-top:18px;border-top:1px solid #21262d;text-align:center;}
.demo p{color:#555;font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.chips{display:flex;gap:8px;justify-content:center;}
.chip{background:#21262d;border:1px solid #30363d;border-radius:20px;
      padding:5px 14px;font-size:12px;color:#8b949e;cursor:pointer;}
.chip:hover{border-color:#58a6ff;color:#58a6ff;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span class="logo-icon">📺</span>
    <h1>DevStream</h1>
<p style="color:yellow;font-size:18px">
Server :
<span id="server-name">Loading...</span>
</p>
    <p>Live Video Platform</p>
  </div>
  <div class="grp">
    <label for="u">Username</label>
    <input type="text" id="u" placeholder="Enter username" autocomplete="username"/>
  </div>
  <div class="grp">
    <label for="p">Password</label>
    <input type="password" id="p" placeholder="Enter password"/>
  </div>
  <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
  <div class="errmsg" id="err"></div>
  <div class="demo">
    <p>Quick Demo Fill</p>
    <div class="chips">
      <span class="chip" onclick="fill('admin','Admin@123')">Admin</span>
      <span class="chip" onclick="fill('creator1','Creator@123')">Creator</span>
      <span class="chip" onclick="fill('viewer1','Viewer@123')">Viewer</span>
    </div>
  </div>
</div>
<script>
if(
    localStorage.getItem('ds_token') &&
    localStorage.getItem('ds_role')
){
    redirectRole(localStorage.getItem('ds_role'));
}
function fill(u,p){
  document.getElementById('u').value=u;
  document.getElementById('p').value=p;
}
async function doLogin(){
  var btn=document.getElementById('loginBtn');
  var err=document.getElementById('err');
  var u=document.getElementById('u').value.trim();
  var p=document.getElementById('p').value;
  if(!u||!p){showErr('Please enter username and password.');return;}
  btn.disabled=true;btn.textContent='Signing in...';err.style.display='none';
  try{
    var res=await fetch('/api/auth/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:u,password:p})
    });
    var data=await res.json();
    if(!res.ok){showErr(data.detail||'Login failed.');btn.disabled=false;btn.textContent='Sign In';return;}
    localStorage.setItem('ds_token',data.access_token);
    localStorage.setItem('ds_role',data.role);
    localStorage.setItem('ds_user',data.username);
    redirectRole(data.role);
  }catch(e){
    showErr('Cannot reach server. Try again.');
    btn.disabled=false;btn.textContent='Sign In';
  }
}
function redirectRole(r){
  if(r==='admin')window.location.href='/pages/admin.html';
  else if(r==='creator')window.location.href='/pages/creator.html';
  else window.location.href='/pages/viewer.html';
}
function showErr(m){var e=document.getElementById('err');e.textContent=m;e.style.display='block';}
document.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
</script>
<script>
fetch('/hostname.txt')
.then(r => r.text())
.then(t => {
    document.getElementById("server-name").innerHTML =
    t.replace(/\r?\n/g, "<br>");
});
</script>
</body>
</html>
